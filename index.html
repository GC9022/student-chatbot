<!DOCTYPE html>
<html>
<head>
    <title>Student Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Main Wrapper (NEW - important for centering) -->
<div class="wrapper">
    <div class="container">
        <h1>🤖 Student AI Chatbot</h1>

        <div id="chatbox"></div>

        <div id="inputArea">
            <input type="text" id="userInput" placeholder="Ask anything..." onkeypress="handleKey(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
async function sendMessage() {
    let inputField = document.getElementById("userInput");
    let message = inputField.value.trim();

    if (message === "") return;

    let chatbox = document.getElementById("chatbox");

    // User message
    chatbox.innerHTML += `<div class="message user">${message}</div>`;
    chatbox.scrollTop = chatbox.scrollHeight;

    try {
        let response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: message })
        });

        let data = await response.json();

        // Bot message
        chatbox.innerHTML += `<div class="message bot">${data.reply}</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;

    } catch (error) {
        chatbox.innerHTML += `<div class="message bot">Error connecting to server</div>`;
    }

    inputField.value = "";
}

// Enter key support
function handleKey(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}
</script>

</body>
</html>
